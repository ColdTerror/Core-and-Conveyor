<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="docTitle">Gamename</title>
<style>
@font-face{
  font-family:"3270 Nerd Font";
  src:url("https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@master/patched-fonts/3270/Regular/3270NerdFont-Regular.ttf") format("truetype");
}
body{font-family:"3270 Nerd Font", monospace;background:#272638;margin:0;padding:20px;color:#fff}
.container{max-width:900px;margin:auto}
input, button, textarea {
    font-family: "3270 Nerd Font", monospace;
}
h1{text-align:center}
.controls{display:flex;gap:10px;margin-bottom:20px}
.controls input{flex:1;padding:10px;border-radius:6px;border:none}
.controls button{padding:10px 16px;border-radius:6px;border:none;cursor:pointer}
.item{margin-bottom:10px;position:relative}
.item-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle-box{width:28px;height:28px;border-radius:6px;background:#e74a18;display:flex;align-items:center;justify-content:center;color:white}
.subitems{margin-top:10px;margin-left:38px;display:none}
.subitem{display:flex;align-items:center;margin-bottom:8px;position:relative}
.sub-dot{width:14px;height:14px;border-radius:4px;background:#e74a18;margin-right:8px}
.sub-bar{flex:1;background:#38374f;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:10px}
.sub-bar input{flex:1;background:transparent;border:none;color:white;outline:none}
.status{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#fff}
.status.todo{background:#555}
.status.progress{background:#3498db}
.status.testing{background:#f1c40f;color:#000}
.status.done{background:#2ecc71}
.add-sub{margin-top:8px;padding:6px 10px;border-radius:6px;border:none;cursor:pointer}
.delete-all{margin-left:10px}
.notes-header{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  margin-top:20px;
}

.notes-title{
  display:flex;
  align-items:center;
}
.notes-toggle{
  background:#4cafef;   /* ← choose any color you want */
  color:white;
}
#pageTitle{
  outline:none;
  cursor:text;
}

#pageTitle:hover{
  opacity:0.85;
}

#pageTitle:focus{
  text-shadow: 0 0 8px rgba(231,74,24,0.4);
}

</style>
</head>
<body>
<div class="container">
<h1 id="pageTitle" contenteditable="true" spellcheck="false">
Click to change name
</h1>
<div class="controls">
<input id="itemInput" placeholder="New project item..." />
<button id="addBtn">Add Item</button>
<button class="delete-all" id="deleteAllBtn">Delete All</button>
<input type="file" id="importFile" style="display:none" />
<button id="exportBtn">Export</button>
<button id="importBtn">Import</button>
</div>
<div id="items"></div>
<div class="notes-section">
  <div class="notes-header" id="notesHeader">
    <div class="toggle-box notes-toggle" id="notesToggle">▶</div>

    <div class="notes-title">Ideas</div>
  </div>
  <textarea id="notesContent"
    placeholder="Write your notes here..."
    style="display:none;width:100%;height:150px;margin-top:10px;border-radius:6px;padding:10px;background:#38374f;color:white;border:none;font-family:'3270 Nerd Font', monospace;">
  </textarea>
</div>


</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const inputEl = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    const itemsEl = document.getElementById('items');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');

    let data = [];

    const statuses = [
        {name:"To Do", cls:"todo"},
        {name:"In Progress", cls:"progress"},
        {name:"Testing", cls:"testing"},
        {name:"Done", cls:"done"}
    ];

	// --- Editable Title ---
const pageTitleEl = document.getElementById('pageTitle');
const docTitleEl = document.getElementById('docTitle');

// Load saved title
const savedTitle = localStorage.getItem('pm_title');
if(savedTitle){
    pageTitleEl.innerText = savedTitle;
    document.title = savedTitle;
}

// Save title on edit
function saveTitle(){
    const val = pageTitleEl.innerText.trim() || 'Project Manager';
    localStorage.setItem('pm_title', val);
    document.title = val;
}

// Save on blur (click away)
pageTitleEl.addEventListener('blur', saveTitle);

// Save on Enter
pageTitleEl.addEventListener('keydown', e=>{
    if(e.key === 'Enter'){
        e.preventDefault();
        pageTitleEl.blur();
    }
});


    function save(){ localStorage.setItem('pm_data', JSON.stringify(data)); }

    function load(){
        const raw = localStorage.getItem('pm_data');
        if(raw){
            try {
                const parsed = JSON.parse(raw);
                data = Array.isArray(parsed) ? parsed : [];
            } catch { data = []; }
        } else { data = []; }
        render();
    }

    function render(){
        itemsEl.innerHTML = '';
        let dragSrcIndex = null;

        data.forEach((item,i)=>{
            const el = document.createElement('div');
            el.className='item';
            el.setAttribute('draggable', true);

            // --- Drag & Drop for items ---
            el.addEventListener('dragstart', e => {
                dragSrcIndex = i;
                e.dataTransfer.effectAllowed = 'move';
                el.style.opacity = '0.5';
            });
            el.addEventListener('dragend', e => { el.style.opacity = ''; });
            el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; });
            el.addEventListener('drop', e => {
                e.stopPropagation();
                if(dragSrcIndex === null || dragSrcIndex === i) return;
                const [moved] = data.splice(dragSrcIndex, 1);
                data.splice(i, 0, moved);
                dragSrcIndex = null;
                save(); render();
            });

            const header = document.createElement('div');
            header.className='item-header';
            const toggle = document.createElement('div');
            toggle.className='toggle-box';
            toggle.innerText = item.open ? '▼' : '▶';
            const title = document.createElement('div');
            title.innerText = item.title;
            header.appendChild(toggle);
            header.appendChild(title);

            // Right-click to delete item
            header.addEventListener('contextmenu', e => {
                e.preventDefault();
                if(confirm('Delete this item?')){
                    data.splice(i,1);
                    save(); render();
                }
            });

            // Click to toggle open
            header.addEventListener('click', ()=>{
                item.open = !item.open;
                save(); render();
            });

            el.appendChild(header);

            const subContainer = document.createElement('div');
            subContainer.className='subitems';
            subContainer.style.display = item.open ? 'block' : 'none';

            let dragSubSrcIndex = null;

            item.subitems.forEach((sub,si)=>{
                const subEl = document.createElement('div');
                subEl.className='subitem';
                subEl.setAttribute('draggable', true);

                // --- Drag & Drop for subitems ---
                subEl.addEventListener('dragstart', e=>{
                    dragSubSrcIndex = si;
                    e.dataTransfer.effectAllowed='move';
                    subEl.style.opacity='0.5';
                });
                subEl.addEventListener('dragend', e=>{ subEl.style.opacity=''; });
                subEl.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
                subEl.addEventListener('drop', e=>{
                    e.stopPropagation();
                    if(dragSubSrcIndex === null || dragSubSrcIndex === si) return;
                    const [moved] = item.subitems.splice(dragSubSrcIndex, 1);
                    item.subitems.splice(si, 0, moved);
                    dragSubSrcIndex = null;
                    save(); render();
                });

                const dot = document.createElement('div');
                dot.className='sub-dot';
                const bar = document.createElement('div');
                bar.className='sub-bar';
                const input = document.createElement('input');
                input.value = sub.desc;
                input.addEventListener('input',(e)=>{ sub.desc = e.target.value; save(); });
                const status = document.createElement('div');
                status.className = 'status ' + statuses[sub.status].cls;
                status.innerText = statuses[sub.status].name;
                status.addEventListener('click',()=>{ sub.status = (sub.status+1)%statuses.length; save(); render(); });

                bar.appendChild(input);
                bar.appendChild(status);

                // Right-click to delete subitem
                subEl.addEventListener('contextmenu', e=>{
                    e.preventDefault();
                    if(confirm('Delete this subitem?')){
                        item.subitems.splice(si,1);
                        save(); render();
                    }
                });

                subEl.appendChild(dot);
                subEl.appendChild(bar);
                subContainer.appendChild(subEl);
            });

            const addSub = document.createElement('button');
            addSub.className='add-sub';
            addSub.innerText='+ Add Subitem';
            addSub.addEventListener('click',(e)=>{
                e.stopPropagation();
                item.subitems.push({desc:'',status:0});
                save(); render();
            });
            subContainer.appendChild(addSub);

            el.appendChild(subContainer);
            itemsEl.appendChild(el);
        });
    }

    // Add new item
    addBtn.addEventListener('click',()=>{
        const val = inputEl.value.trim();
        if(!val) return;
        data.push({title: val, open:false, subitems: []});
        inputEl.value = '';
        save(); render();
    });
    inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') addBtn.click(); });

    // Delete all data
    deleteAllBtn.addEventListener('click',()=>{
        if(confirm('Are you sure you want to delete all data?')){
            data = [];
            save(); render();
        }
    });

    // Export JSON
    exportBtn.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'project_data.json';
        a.click();
        URL.revokeObjectURL(url);
    });

    // Import JSON
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt){
            try {
                const imported = JSON.parse(evt.target.result);
                if(Array.isArray(imported)){
                    data = imported;
                    save();
                    render();
                    alert('Data imported successfully!');
                } else {
                    alert('Invalid file format');
                }
            } catch(err){
                alert('Error parsing JSON');
            }
        };
        reader.readAsText(file);
    });

    load();
	
	// --- Notes Section ---
const notesToggle = document.getElementById('notesToggle');
const notesContent = document.getElementById('notesContent');

// Load notes state from localStorage
let notesData = { open: false, content: '' };
const rawNotes = localStorage.getItem('pm_notes');
if(rawNotes){
    try { notesData = JSON.parse(rawNotes); } catch {}
}
notesContent.style.display = notesData.open ? 'block' : 'none';
notesToggle.innerText = notesData.open ? '▼' : '▶';
notesContent.value = notesData.content;

// Toggle notes open/closed
notesToggle.addEventListener('click', () => {
    notesData.open = !notesData.open;
    notesContent.style.display = notesData.open ? 'block' : 'none';
    notesToggle.innerText = notesData.open ? '▼' : '▶';
    localStorage.setItem('pm_notes', JSON.stringify(notesData));
});

// Save notes on input
notesContent.addEventListener('input', e => {
    notesData.content = e.target.value;
    localStorage.setItem('pm_notes', JSON.stringify(notesData));
});

});
</script>


</body>

</html>
